<script type="module">

);

/* =======================
   LOAD SELECTED CAR
======================= */
const carId = localStorage.getItem("selectedCarId");
if (!carId) {
  alert("No car selected");
  window.location.href = "economy.html";
}

const carImgEl = document.getElementById("carImg");
const carNameEl = document.getElementById("carName");
const carPriceEl = document.getElementById("carPrice");
const plateWrap = document.getElementById("plateWrap");

let carData = null;

// =======================
// ELEMENT REFERENCES (IMPORTANT FIX)
// =======================
const bookingForm = document.getElementById("bookingForm");

const dropAddress = document.getElementById("dropAddress");
const fullName = document.getElementById("fullName");
const email = document.getElementById("email");
const phone = document.getElementById("phone");
const licenseNumber = document.getElementById("licenseNumber");

const pickupLat = document.getElementById("pickupLat");
const pickupLng = document.getElementById("pickupLng");
const pickupAddress = document.getElementById("pickupAddress");


async function loadCar() {
  const { data, error } = await supabase
    .from("cars")
    .select("*")
    .eq("id", carId)
    .single();

  if (error || !data) {

  }

  carData = data;
  carImgEl.src = data.image_url;
  carNameEl.textContent = data.name;
  carPriceEl.textContent = `₹${data.rent_per_hour} / hour`;
  plateWrap.innerHTML = `<span class="number-plate">${data.brand}</span>`;
}
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const captureBtn = document.getElementById("captureBtn");
const photoPreview = document.getElementById("photoPreview");
const identityProof = document.getElementById("identityProof");
const pdfSuccess = document.getElementById("pdfSuccess");
const photoSuccess = document.getElementById("photoSuccess");

let stream;

// ================= CAPTURE PHOTO =================
let capturedImage = null;
captureBtn.addEventListener("click", () => {

  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  capturedImage = canvas.toDataURL("image/png");

  const photoPreview = document.getElementById("photoPreview");

  photoPreview.src = capturedImage;
  photoPreview.style.display = "block";
});

// ================= PDF VALIDATION =================
identityProof.addEventListener("change", () => {
  const file = identityProof.files[0];

  if (!file) return;

  if (file.type !== "application/pdf") {
   showToast("Only PDF files are allowed!", "error");

  
    identityProof.value = "";
    return;
  }

  pdfSuccess.classList.remove("hidden");
});



// 🔹 Start camera only when needed
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    video.style.display = "block";
  } catch (err) {
    alert("Camera access denied!");
  }
}

// 🔹 Stop camera
function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    video.srcObject = null;
    video.style.display = "none";
  }
}

captureBtn.addEventListener("click", async () => {

  // If camera not started → start camera
  if (!stream) {
    await startCamera();
    captureBtn.textContent = "Take Photo";
    return;
  }

  // If camera already running → capture photo
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

 capturedImage = canvas.toDataURL("image/png");

const photoPreview = document.getElementById("photoPreview");

photoPreview.src = capturedImage;
photoPreview.style.display = "block";
  // Stop camera after capture
  stopCamera();

  // Change button text back
  captureBtn.textContent = "Capture Photo";
});

/* =======================
   MUMBAI MAP
======================= */

// Mumbai coordinates
const mumbaiBounds = [
  [18.89, 72.77],  // South-West
  [19.27, 72.99]   // North-East
];

const map = L.map("map", {
  maxBounds: mumbaiBounds,
  maxBoundsViscosity: 1.0
}).setView([19.0760, 72.8777], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let pickupMarker;
let dropMarker;
let selecting = "pickup";

window.setSelecting = function(type){
  selecting = type;
}

map.on("click", async (e) => {

  const { lat, lng } = e.latlng;

  if (selecting === "pickup") {
    if (pickupMarker) map.removeLayer(pickupMarker);
    pickupMarker = L.marker([lat,lng], {color:'green'}).addTo(map);
    pickupLat.value = lat;
    pickupLng.value = lng;
  } else {
    if (dropMarker) map.removeLayer(dropMarker);
    dropMarker = L.marker([lat,lng], {color:'red'}).addTo(map);
  }

  const res = await fetch(
    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
  );
  const data = await res.json();

 if (selecting === "pickup") {
  pickupAddress.value = data.display_name;
  document.getElementById("pickupDisplay").textContent = data.display_name;
} else {
  dropAddress.value = data.display_name;   // 🔥 ADD THIS LINE
  document.getElementById("dropDisplay").textContent = data.display_name;
}
});
/* =======================
   PRICE CALCULATION (TIME ONLY)
======================= */

const pickupTime = document.getElementById("pickupTime");
const dropTime = document.getElementById("dropTime");
const totalAmountEl = document.getElementById("totalAmount");

function to24(time) {
  const m = time.match(/(\d+):(\d+)(am|pm)/i);
  if (!m) return null;

  let h = parseInt(m[1]);
  if (m[3].toLowerCase() === "pm" && h !== 12) h += 12;
  if (m[3].toLowerCase() === "am" && h === 12) h = 0;

  return `${h.toString().padStart(2,"0")}:${m[2]}`;
}
// Get selected dates stored from economy page
const selectedPickupDate = localStorage.getItem("pickupDate");
const selectedDropDate = localStorage.getItem("dropDate");

function calculateTotal() {
  if (!carData) return;
  if (!pickupTime.value || !dropTime.value) return;
  if (!selectedPickupDate || !selectedDropDate) return;

  const start = new Date(`${selectedPickupDate}T${to24(pickupTime.value)}`);
  const end = new Date(`${selectedDropDate}T${to24(dropTime.value)}`);

  if (end <= start) {
    totalAmountEl.textContent = "₹0";
    return;
  }

  const hours = Math.ceil((end - start) / (1000 * 60 * 60));

  totalAmountEl.textContent =
    `₹${hours * carData.rent_per_hour}`;
}
[pickupTime, dropTime].forEach(el =>
  el.addEventListener("change", calculateTotal)
);

/* =======================
   FORM SUBMIT (FIXED)
======================= */
bookingForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const { data: authData } = await supabase.auth.getUser();

  if (!authData.user) {
    showToast("Please login first", "error");
    return;
  }

  const user = authData.user;

  // =====================
  // Upload PDF
  // =====================
  const file = identityProof.files[0];
  const fileName = `proof_${Date.now()}.pdf`;

  const { error: uploadError } =
    await supabase.storage.from("documents").upload(fileName, file);

  if (uploadError) {
    showToast("PDF upload failed: " + uploadError.message, "error");
    return;
  }

  // =====================
  // Upload Photo
  // =====================
  const blob = await (await fetch(capturedImage)).blob();
  const imageName = `face_${Date.now()}.png`;

  const { error: imgError } =
    await supabase.storage.from("documents").upload(imageName, blob);

  if (imgError) {
    showToast("Photo upload failed: " + imgError.message, "error");
    return;
  }

  // =====================
  // INSERT INTO DATABASE
  // =====================
  const bookingData = {
    car_id: carData.id,
    car_name: carData.name,
    full_name: fullName.value,
    email: email.value,
    phone: phone.value,
    license_number: licenseNumber.value,

    pickup_date: selectedPickupDate,
    pickup_time: pickupTime.value,

    drop_date: selectedDropDate,
    drop_time: dropTime.value,

    pickup_address: pickupAddress.value || null,
    drop_address: dropAddress.value || null,

    total_amount: parseFloat(
      totalAmountEl.textContent.replace("₹", "")
    ),

    status: "confirmed",

    identity_url: fileName,
    photo_url: imageName,

    user_email: user.email,
    user_id: user.id
  };

  console.log("Sending to DB:", bookingData);

  const { data, error } = await supabase
    .from("booking")
    .insert([bookingData])
    .select()
    .single();

  if (error) {
    console.error("INSERT ERROR:", error);
    showToast(error.message, "error");
    return;
  }

  localStorage.setItem("bookingId", data.id);

  showToast("Booking successful!", "success");

  setTimeout(() => {
    window.location.href = "bookcon.html";
  }, 2000);
});

function showToast(message, type = "success") {
  const toast = document.createElement("div");

  toast.textContent = message;

  toast.style.position = "fixed";
  toast.style.bottom = "30px";
  toast.style.right = "30px";
  toast.style.padding = "14px 20px";
  toast.style.borderRadius = "10px";
  toast.style.color = "white";
  toast.style.fontWeight = "600";
  toast.style.zIndex = "9999";
  toast.style.boxShadow = "0 6px 18px rgba(0,0,0,0.2)";
  toast.style.transition = "opacity 0.4s ease";

  if (type === "error") {
    toast.style.background = "#dc2626"; // red
  } else {
    toast.style.background = "#16a34a"; // green
  }

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.style.opacity = "0";
    setTimeout(() => toast.remove(), 400);
  }, 3000);
}
