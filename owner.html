<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Owner Rent Form</title>
  <style>
    @keyframes slideIn {
      0% {
        opacity: 0;
        transform: translateY(50px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #0d0d0d;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #ffd700;
      animation: fadeIn 1.5s ease-out;
    }

    .form-container {
      max-width: 700px;
      margin: 50px auto;
      background-color: #1a1a1a;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
      animation: slideIn 0.8s ease-out;
    }

    h2 {
      text-align: center;
      color: #ffd700;
      margin-bottom: 30px;
      font-size: 2rem;
      animation: fadeIn 1s ease-out;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .required {
      color: red;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #555;
      border-radius: 8px;
      background-color: #262626;
      color: #ffd700;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #ffd700;
      background-color: #1f1f1f;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
      outline: none;
    }

    button {
      margin-top: 30px;
      width: 100%;
      padding: 15px;
      font-size: 1.1rem;
      background-color: #ffd700;
      color: #000;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.4s ease;
    }

    button:hover {
      background-color: #e6c200;
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(255, 215, 0, 0.3);
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>List Your Car for Rent</h2>
    <form onsubmit="return validateForm()">
      <label for="ownerName">Owner Name <span class="required">*</span></label>
      <input type="text" id="ownerName" name="ownerName" required>

      <label for="email">Email <span class="required">*</span></label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number <span class="required">*</span></label>
      <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>

      <label for="city">City <span class="required">*</span></label>
      <select id="city" name="city" required>
        <option value="">-- Select City --</option>
        <option value="mumbai">Mumbai</option>
        <option value="pune">Pune</option>
        <option value="delhi">Delhi</option>
        <option value="bangalore">Bangalore</option>
        <option value="hyderabad">Hyderabad</option>
      </select>

      <label for="carModel">Car Model <span class="required">*</span></label>
      <input type="text" id="carModel" name="carModel" required>

      <label for="purchaseYear">Year of Purchase <span class="required">*</span></label>
      <input type="number" id="purchaseYear" name="purchaseYear" min="1990" max="2025" required>

      <label for="regNumber">Registration Number <span class="required">*</span></label>
      <input type="text" id="regNumber" name="regNumber" required>

      <label for="carCondition">Car Condition / Additional Notes</label>
      <textarea id="carCondition" name="carCondition" rows="4"></textarea>

      <label for="price">Expected Rental Price (per day) ₹ <span class="required">*</span></label>
      <input type="number" id="price" name="price" required>

      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    function validateForm() {
      const phone = document.getElementById("phone").value;
      if (!/^\d{10}$/.test(phone)) {
        alert("Phone number must be 10 digits.");
        return false;
      }

      const year = document.getElementById("purchaseYear").value;
      if (year < 1990 || year > 2025) {
        alert("Please enter a valid year between 1990 and 2025.");
        return false;
      }

      return true;
    }
  </script>
</body>
</html>
