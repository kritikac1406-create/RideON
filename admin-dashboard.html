<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | RideON</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lato:wght@300;400&display=swap"
    rel="stylesheet">

  <style>
    body {
      background: #F7F7E8;
      font-family: 'Lato', sans-serif;
    }
  </style>
</head>

<body class="min-h-screen">

  <!-- NAVBAR -->
  <header class="bg-white shadow px-10 py-4 flex justify-between items-center fixed top-0 w-full z-50">

    <a href="javascript:void(0)" onclick="window.location.href = localStorage.getItem('userRole') === 'admin' ? 'admin-home.html' : 'home.html'" class="text-3xl font-bold" style="font-family:'Cinzel'">
      <a href="javascript:void(0)" onclick="window.location.href = localStorage.getItem('userRole') === 'admin' ? 'admin-home.html' : 'home.html'" onclick="window.location.href = localStorage.getItem('userRole') === 'admin' ? 'admin-home.html' : 'home.html'" onclick="window.location.href = localStorage.getItem('userRole') === 'admin' ? 'admin-home.html' : 'home.html'"><div class="text-2xl font-bold" style="font-family:'Cinzel'">Ride<span class="text-gray-600">ON</span></div></a>
    </a>

    <div class="flex items-center gap-6 font-semibold">
      <a href="admin-users.html" class="text-gray-700 hover:text-[#114b72] transition">
        Users
      </a>

      <button onclick="logoutAdmin()" class="text-red-600 hover:underline">
        Logout
      </button>
    </div>

  </header>

  <!-- CONTENT -->
  <main class="pt-28 px-10">

    <h1 class="text-4xl font-bold mb-8" style="font-family:'Cinzel'">
      All Bookings
    </h1>

    <div class="bg-white rounded-xl shadow p-6 max-w-6xl overflow-x-auto">

      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-gray-100 text-left">
            <th class="p-3">#</th>
            <th class="p-3">Car</th>
            <th class="p-3">User</th>
            <th class="p-3">Start</th>
            <th class="p-3">End</th>
            <th class="p-3">Status</th>
            <th class="p-3">Availability</th>


          </tr>
        </thead>

        <tbody id="bookingTable">
          <tr>
            <td colspan="6" class="text-center text-gray-500 p-6">
              Loading bookings...
            </td>
          </tr>
        </tbody>
      </table>

    </div>

  </main>

  <script>
    /* ================= SUPABASE ================= */
    const SUPABASE_URL = "https://ecuvhnvpajodymdibuwt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXZobnZwYWpvZHltZGlidXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjA0ODcsImV4cCI6MjA4NTQ5NjQ4N30.qJclkXxnYjPu7vSZD4MGyJch6n4pCjcd9HiD8hdM31g"


    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    /* ================= ADMIN GUARD ================= */
    /* ================= ADMIN GUARD ================= */
    async function checkAdmin() {
      // 1. Get the currently logged-in user
      const { data: authData } = await supabaseClient.auth.getUser();

      // 2. If nobody is logged in, kick them back to the main login page
      if (!authData.user) {
        window.location.href = "log.html";
        return;
      }

      // 3. Check the role from the user_metadata (which was set during signup)
      const role = authData.user.user_metadata.role || "user";

      // 4. If their role is NOT "admin", kick them to the regular home page
      if (role !== "admin") {
        alert("You do not have permission to view the admin dashboard.");
        window.location.href = "home.html";
      }
    }


    /* ================= LOAD BOOKINGS ================= */
    async function loadBookings() {
      const table = document.getElementById("bookingTable");

      const { data, error } = await supabaseClient
        .from("booking")
        .select("car_id, car_name, user_email, pickup_date, pickup_time, drop_date, drop_time, status")
        .order("pickup_date", { ascending: true });


      if (error) {
        console.error(error);
        table.innerHTML = `
      <tr>
        <td colspan="6" class="text-center text-red-500 p-6">
          Failed to load bookings
        </td>
      </tr>`;
        return;
      }

      if (!data || data.length === 0) {
        table.innerHTML = `
      <tr>
        <td colspan="6" class="text-center text-gray-500 p-6">
          No bookings yet
        </td>
      </tr>`;
        return;
      }

      table.innerHTML = "";

      data.forEach((b, i) => {

        const status = b.status || "pending";

        const now = new Date();

        let availabilityText = "Available";
        let availabilityColor = "text-green-600";

        if (b.pickup_date && b.pickup_time && b.drop_date && b.drop_time) {

          const start = new Date(`${b.pickup_date}T${b.pickup_time}`);
          const end = new Date(`${b.drop_date}T${b.drop_time}`);

          if (now >= start && now <= end) {
            availabilityText = "Currently Booked";
            availabilityColor = "text-red-600";
          } else if (now < start) {
            availabilityText = "Upcoming Booking";
            availabilityColor = "text-yellow-600";
          }
        }



        table.innerHTML += `
    <tr class="border-t">
      <td class="p-3">${i + 1}</td>

      <td class="p-3">${b.car_name || "-"}</td>

      <td class="p-3">${b.user_email || "-"}</td>

      <td class="p-3">
        ${b.pickup_date}<br>
        <span class="text-sm text-gray-500">${b.pickup_time}</span>
      </td>

      <td class="p-3">
        ${b.drop_date}<br>
        <span class="text-sm text-gray-500">${b.drop_time}</span>
      </td>

      <td class="p-3">
        <span class="px-3 py-1 rounded-full text-sm
          ${status === "confirmed"
            ? "bg-green-100 text-green-700"
            : "bg-yellow-100 text-yellow-700"}">
          ${status}
        </span>
      </td>

      <td class="p-3">
        <span class="${availabilityColor} font-semibold">
  ${availabilityText}
</span>

      </td>
    </tr>
  `;
      });
    }


    /* ================= CONFIRM BOOKING ================= */
    async function confirmBooking(id) {

      const { error } = await supabaseClient
        .from("booking")
        .update({ status: "confirmed" })
        .eq("id", id);

      if (error) {
        alert("Failed to confirm booking");
        return;
      }

      loadBookings();
    }

    /* ================= DELETE BOOKING ================= */
    async function deleteBooking(id) {
      const confirmDelete = confirm("Are you sure you want to delete this booking?");
      if (!confirmDelete) return;

      const { error } = await supabaseClient
        .from("booking")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Failed to delete booking");
        return;
      }

      loadBookings();
    }

    /* ================= LOGOUT ================= */
    async function logoutAdmin() {
      await supabaseClient.auth.signOut();
localStorage.removeItem('userRole');
      window.location.href = "admin-login.html";
    }

    /* ================= INIT ================= */
    (async function init() {
      await checkAdmin();
      await loadBookings();
    })();
  </script>


</body>

</html>
