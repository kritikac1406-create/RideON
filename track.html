<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Your Ride | RideON</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  background: linear-gradient(135deg, #f3f6f9, #e7eef5);
  font-family: Inter, sans-serif;
}
#map{
  height: 380px;
  border-radius: 20px;
}
</style>
</head>

<body class="min-h-screen">

<!-- ================= NAVBAR ================= -->
<header class="bg-white shadow-sm py-6 px-10">
  <h1 style="font-family:'Cinzel'; font-size:34px;">
    <h1 style="font-family:'Cinzel';font-size:38px;">
  <a href="home.html" class="hover:opacity-80">
    <span class="text-green-900">Ride</span><span class="text-gray-600">ON</span>
  </a>
  </h1>
</header>


<!-- ================= MAIN CONTENT ================= -->
<div class="flex justify-center py-14">

  <div class="w-full max-w-3xl bg-white rounded-3xl shadow-xl p-10">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h2 class="text-3xl font-bold text-gray-800">
          Track Your Ride
        </h2>
        <p class="text-gray-500 text-sm">
          Live Driver Location
        </p>
      </div>

      <div id="rideStatus"
           class="bg-green-100 text-green-700 px-5 py-2 rounded-full text-sm font-semibold">
        Checking schedule...
      </div>
    </div>

    <!-- MAP -->
    <div id="map" class="shadow-md hidden mb-8"></div>

    <!-- CAR DETAILS -->
    <div class="flex items-center gap-8">

      <div class="bg-gray-100 p-5 rounded-2xl shadow-sm">
        <img id="carImage"
             class="w-28 h-20 object-contain">
      </div>

      <div class="flex-1">
        <h3 id="carName"
            class="text-2xl font-semibold text-gray-800">
        </h3>

        <div class="mt-3 inline-block bg-yellow-400 px-4 py-1 rounded-full text-sm font-bold">
          <span id="numberPlate"></span>
        </div>

        <p class="mt-5 text-gray-600">
          Status:
          <span id="eta"
                class="font-semibold text-gray-900">
            Loading...
          </span>
        </p>
      </div>

    </div>

  </div>

</div>


<!-- ================= SCRIPT ================= -->
<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ecuvhnvpajodymdibuwt.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXZobnZwYWpvZHltZGlidXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjA0ODcsImV4cCI6MjA4NTQ5NjQ4N30.qJclkXxnYjPu7vSZD4MGyJch6n4pCjcd9HiD8hdM31g"

);

const bookingId = localStorage.getItem("bookingId");

function convertTo24(time){
  const match = time.match(/(\d+):(\d+)(am|pm)/i);
  let h = parseInt(match[1]);
  const m = match[2];
  const mer = match[3].toLowerCase();

  if(mer === "pm" && h !== 12) h += 12;
  if(mer === "am" && h === 12) h = 0;

  return `${h.toString().padStart(2,"0")}:${m}`;
}

async function loadData(){

  const { data: booking } = await supabase
    .from("booking")
    .select("*")
    .eq("id", bookingId)
    .single();

  if(!booking){
    alert("Booking not found");
    return;
  }

  const { data: car } = await supabase
    .from("cars")
    .select("*")
    .eq("id", booking.car_id)
    .single();

  document.getElementById("carName").textContent = car.name;
  document.getElementById("carImage").src = car.image_url;
  document.getElementById("numberPlate").textContent =
    car.number_plate || car.brand;

  // ===== PICKUP TIME LOGIC =====

  const pickupDateTime = new Date(
    booking.pickup_date + "T" + convertTo24(booking.pickup_time)
  );

  const now = new Date();
  const diffMinutes = (pickupDateTime - now) / (1000 * 60);

  // More than 30 mins away
  if(diffMinutes > 30){
    document.getElementById("rideStatus").textContent =
      "Ride Scheduled";
    document.getElementById("eta").textContent =
      "Tracking starts 30 mins before pickup";
    return;
  }

  // Within 30 mins before pickup
  if(diffMinutes > 0 && diffMinutes <= 30){
    document.getElementById("rideStatus").textContent =
      "Driver will be assigned soon";
    document.getElementById("eta").textContent =
      Math.ceil(diffMinutes) + " mins to pickup";
    return;
  }

  // Pickup time reached → start tracking
  document.getElementById("rideStatus").textContent =
    "Driver on the way";

  document.getElementById("map").classList.remove("hidden");

  initMap();
}

function initMap(){

  const pickupLat = 19.0760; // Mumbai center
  const pickupLng = 72.8777;

  const map = L.map("map").setView([pickupLat, pickupLng], 13);

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
  ).addTo(map);

  L.marker([pickupLat, pickupLng])
    .addTo(map)
    .bindPopup("Pickup Location")
    .openPopup();

  const carIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/744/744465.png",
    iconSize: [40, 40],
    iconAnchor: [20, 20]
  });

  let driverLat = pickupLat + 0.05;
  let driverLng = pickupLng + 0.03;

  const carMarker = L.marker([driverLat, driverLng], {
    icon: carIcon
  }).addTo(map);

  const steps = 120;
  let count = 0;

  const latStep = (pickupLat - driverLat) / steps;
  const lngStep = (pickupLng - driverLng) / steps;

  const interval = setInterval(()=>{

    if(count >= steps){
      clearInterval(interval);
      document.getElementById("rideStatus").textContent =
        "Driver has arrived";
      document.getElementById("eta").textContent = "Arrived";
      return;
    }

    driverLat += latStep;
    driverLng += lngStep;

    carMarker.setLatLng([driverLat, driverLng]);

    const minutesLeft = Math.ceil((steps - count) / 40);
    document.getElementById("eta").textContent =
      minutesLeft > 0 ? minutesLeft + " mins" : "Arrived";

    count++;

  }, 100);

}

loadData();

</script>

</body>
</html>
