<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manage Fleet Cars | RideON Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family:'Lato',sans-serif; background:#f7f8e8; margin:0; }
    h1,h2,h3 { font-family:'Cinzel',serif; }
  </style>
</head>
<body class="min-h-screen">
  
 <nav class="fixed top-0 left-0 w-full z-50 bg-white shadow-md border-b">
  <div class="w-full grid grid-cols-3 items-center px-4 py-4">
    <div class="flex justify-start items-center">
      <div class="text-2xl font-bold" style="font-family:'Cinzel'">
        Ride<span class="text-gray-600">ON</span> <span class="text-xs text-red-600 ml-2 font-sans tracking-widest px-2 py-1 bg-red-100 rounded-md">ADMIN PANEL</span>
      </div>
    </div>
    <div class="flex justify-center">
      <ul class="hidden md:flex items-center space-x-8 text-lg font-bold">
        <li><a href="offer.html" class="hover:text-[#114b72] transition">Offers</a></li>
        <li><a href="admin-dashboard.html" class="hover:text-[#114b72] transition">Dashboard</a></li>
        <li><a href="addcar.html" class="text-[#114b72] border-b-2 border-[#114b72] pb-1">Add Cars</a></li>
        <li><a href="admin-users.html" class="hover:text-[#114b72] transition">Users</a></li>
      </ul>
    </div>
    <div class="flex justify-end items-center gap-4">
      <button onclick="adminLogout()" class="text-red-600 font-bold hover:underline bg-red-50 px-4 py-2 rounded-lg">
        Logout <i class="fas fa-sign-out-alt ml-1"></i>
      </button>
    </div>
  </div>
 </nav>

 <main class="pt-28 max-w-6xl mx-auto px-4" id="adminContent" style="display:none;">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold">Add Fleet Vehicles</h1>
    </div>

    <!-- ADD CAR FORM -->
    <div class="bg-white p-6 rounded-xl shadow border mb-10">
        <h2 class="text-2xl font-bold mb-4">Add New Car to Database</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1 font-bold">Car Name</label>
                <input id="carName" type="text" placeholder="e.g. Tata Nexon" class="border p-3 rounded w-full bg-gray-50 border-gray-300 focus:border-[#114b72] outline-none">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1 font-bold">Car Brand</label>
                <input id="carBrand" type="text" placeholder="e.g. Tata" class="border p-3 rounded w-full bg-gray-50 border-gray-300 focus:border-[#114b72] outline-none">
            </div>
            
            <div>
                <label class="block text-sm text-gray-600 mb-1 font-bold">Fuel Type</label>
                <select id="carFuel" class="border p-3 rounded w-full bg-gray-50 text-gray-700 outline-none">
                    <option value="" disabled selected>Select Fuel Type</option>
                    <option value="petrol">Petrol</option>
                    <option value="cng">CNG</option>
                    <option value="diesel">Diesel</option>
                    <option value="electric">Electric</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1 font-bold">Transmission</label>
                <select id="carTransmission" class="border p-3 rounded w-full bg-gray-50 text-gray-700 outline-none">
                    <option value="" disabled selected>Select Transmission</option>
                    <option value="manual">Manual</option>
                    <option value="automatic">Automatic</option>
                </select>
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-1 font-bold">Car Type (Category)</label>
                <select id="carType" class="border p-3 rounded w-full bg-gray-50 text-gray-700 outline-none">
                    <option value="" disabled selected>Select Car Type</option>
                    <option value="economy">Economy</option>
                    <option value="luxury">Luxury</option>
                    <option value="electric">Electric</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1 font-bold">Rent Per Hour (₹)</label>
                <input id="carPrice" type="number" placeholder="e.g. 1500" class="border p-3 rounded w-full bg-gray-50 border-gray-300 outline-none">
            </div>
        </div>

        <div class="mt-6 border-t pt-4">
            <label class="block text-sm text-gray-600 mb-1 font-bold">Upload Car Image</label>
            <input id="carImageFile" type="file" accept="image/*" class="border p-2 rounded w-full bg-gray-50 text-gray-600">
        </div>

        <button onclick="addCar()" class="mt-8 text-white px-6 py-3 rounded-lg font-bold transition w-full md:w-auto" style="background-color: #114b72;">
            Submit New Car
        </button>
    </div>

    <!-- CARS GRID -->
    <h2 class="text-2xl font-bold mb-4">Current Fleet Listings</h2>
    <div id="carsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-20">
        <div class="col-span-3 text-center text-gray-500 py-10">Loading cars...</div>
    </div>
 </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = supabase.createClient("https://ecuvhnvpajodymdibuwt.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXZobnZwYWpvZHltZGlidXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjA0ODcsImV4cCI6MjA4NTQ5NjQ4N30.qJclkXxnYjPu7vSZD4MGyJch6n4pCjcd9HiD8hdM31g");

async function checkAdmin() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) { window.location.replace("log.html"); return; }
  const role = user.user_metadata?.role || "user";
  if (role !== "admin") {
    alert("Unauthorized access. Admin only.");
    window.location.replace("home.html");
    return;
  }
  document.getElementById("adminContent").style.display = "block";
  loadCars();
}

async function adminLogout() {
  await supabaseClient.auth.signOut();
localStorage.removeItem('userRole');
  window.location.replace("log.html");
}

async function loadCars() {
    const grid = document.getElementById("carsGrid");
    const { data, error } = await supabaseClient.from("cars").select("*").order("created_at", { ascending: false });
    
    if (error) {
        console.error(error);
        if (error.code === '42P01') {
            grid.innerHTML = `<div class="col-span-3 text-red-500 font-bold text-center">The 'cars' table does not exist. Please run the SQL command.</div>`;
        } else {
            grid.innerHTML = `<div class="col-span-3 text-red-500 text-center">Error fetching cars: ${error.message}</div>`;
        }
        return;
    }

    if (!data || data.length === 0) {
        grid.innerHTML = `<div class="col-span-3 text-gray-500 text-center py-8">No cars in fleet yet. Add one above!</div>`;
        return;
    }

    grid.innerHTML = "";
    data.forEach(car => {
        grid.innerHTML += `
        <div class="bg-white rounded-xl overflow-hidden shadow-lg border flex flex-col">
            <div class="relative h-48 bg-gray-100">
                <img src="${car.image_url}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                <div class="absolute top-4 left-4 border-2 border-white px-3 py-1 text-white bg-black bg-opacity-50 rounded">
                    <p class="text-xs">₹${car.price_per_km}/km</p>
                </div>
            </div>
            <div class="p-5 flex-grow">
                <h3 class="text-xl font-bold mb-2">${car.name}</h3>
                <div class="flex flex-wrap gap-2 text-xs font-semibold">
                    <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded">🚗 ${car.brand || 'N/A'}</span>
                    <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded">⛽ ${car.fuel_type || 'N/A'}</span>
                    <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded">⚙️ ${car.transmission || 'N/A'}</span>
                </div>
                <div class="mt-3 text-sm text-gray-500">Routing Cat: ${car.car_type ? car.car_type.toUpperCase() : 'N/A'}</div>
            </div>
            <div class="p-4 bg-gray-50 border-t">
                <button onclick="deleteCar('${car.id}')" class="text-red-600 font-bold hover:underline w-full text-center">Delete Car</button>
            </div>
        </div>
        `;
    });
}

async function addCar() {
    const name = document.getElementById("carName").value.trim();
    const brand = document.getElementById("carBrand").value.trim();
    const fuel = document.getElementById("carFuel").value;
    const transmission = document.getElementById("carTransmission").value;
    const type = document.getElementById("carType").value;
    const price = document.getElementById("carPrice").value;
    
    const fileInput = document.getElementById("carImageFile");
    const file = fileInput.files[0];

    if (!name || !brand || !fuel || !transmission || !type || !price || !file) {
        alert("Make sure EVERY single box is filled out AND a file is selected!");
        return;
    }

    // 1. Upload Image to Supabase Storage Bucket 'car-images'
    const fileExt = file.name.split('.').pop();
    const fileName = Math.random().toString(36).substring(2) + Date.now() + "." + fileExt;

    const { data: uploadData, error: uploadError } = await supabaseClient.storage
        .from("car-images")
        .upload(fileName, file);

    if (uploadError) {
        alert("Error uploading image to 'car-images': " + uploadError.message + "\\nDid you strictly make sure the 'car-images' bucket exists and has a Public INSERT policy?");
        console.error(uploadError);
        return;
    }

    // 2. Get Public URL
    const { data: publicUrlData } = supabaseClient.storage
        .from("car-images")
        .getPublicUrl(fileName);
        
    const imageUrl = publicUrlData.publicUrl;

    // 3. Insert into Database Table 'cars'
    const { error } = await supabaseClient.from("cars").insert([{
        name: name,
        brand: brand,
        fuel_type: fuel,
        transmission: transmission,
        category: type,
        rent_per_hour: parseInt(price),
        image_url: imageUrl
    }]);

    if (error) {
        alert("Database Error!\\nWe successfully uploaded the image, but Supabase rejected saving the car details.\\n\\nThis ALWAYS means your 'cars' table does not match exactly what Javascript sent! \\n\\nPlease ensure your 'cars' table has strictly these Columns:\\nname (text), brand (text), fuel_type (text), transmission (text), category (text), rent_per_hour (int8/number), image_url (text). \\n\\nSupabase Error: " + error.message);
        console.error(error);
    } else {
        alert("Car perfectly added!");
        
        // Reset fields
        document.getElementById("carName").value = '';
        document.getElementById("carBrand").value = '';
        document.getElementById("carFuel").value = '';
        document.getElementById("carTransmission").value = '';
        document.getElementById("carType").value = '';
        document.getElementById("carPrice").value = '';
        document.getElementById("carImageFile").value = '';
        
        loadCars();
    }
}

async function deleteCar(id) {
    if (!confirm("Are you absolutely sure you want to delete this car from the fleet?")) return;
    
    const { error } = await supabaseClient.from("cars").delete().eq("id", id);
    if (error) {
        alert("Error deleting car: " + error.message);
    } else {
        loadCars();
    }
}

checkAdmin();
</script>
</body>
</html>
