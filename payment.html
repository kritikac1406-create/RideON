<!DOCTYPE html>
<html>
<head>
  <title>Secure Checkout | RideON</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background:#f5f5f2; }

    .tab-active {
      border-bottom:3px solid #d4af37;
      color:#b8860b;
      font-weight:600;
    }

    .loader {
      border:4px solid #f3f3f3;
      border-top:4px solid #d4af37;
      border-radius:50%;
      width:60px;
      height:60px;
      animation:spin 1s linear infinite;
      margin:auto;
    }

    @keyframes spin {
      0% {transform:rotate(0deg);}
      100% {transform:rotate(360deg);}
    }

    .checkmark {
      font-size:70px;
      color:#16a34a;
      animation:pop 0.4s ease forwards;
    }

    @keyframes pop {
      0% {transform:scale(0);opacity:0;}
      100% {transform:scale(1);opacity:1;}
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full bg-white shadow-md border-b z-50">
  <a href="javascript:void(0)" onclick="window.location.href = localStorage.getItem('userRole') === 'admin' ? 'admin-home.html' : 'home.html'" onclick="window.location.href = localStorage.getItem('userRole') === 'admin' ? 'admin-home.html' : 'home.html'" onclick="window.location.href = localStorage.getItem('userRole') === 'admin' ? 'admin-home.html' : 'home.html'"><div class="px-6 py-4 text-2xl font-bold">
    Ride<span class="text-gray-600">ON</span>
  </div></a>
</nav>

<div style="height:80px;"></div>

<div class="bg-white shadow-2xl rounded-2xl w-[950px] overflow-hidden">
  <div class="flex">

    <!-- LEFT SECTION -->
    <div class="w-2/3 p-10">

      <h2 class="text-2xl font-bold mb-6">Secure Payment</h2>

      <!-- TABS -->
      <div class="flex gap-8 border-b mb-8 text-gray-600">
        <button id="tab-card" class="tab-active pb-2">Cards</button>
        <button id="tab-upi" class="pb-2">UPI</button>
        <button id="tab-net" class="pb-2">Net Banking</button>
      </div>

      <!-- CARD -->
      <div id="content-card" class="tab-content">
        <label class="text-sm text-gray-600">Card Number</label>
        <input placeholder="1234 5678 9012 3456"
          class="w-full border p-3 rounded-lg mt-1 mb-4">

        <div class="flex gap-4">
          <div class="w-1/2">
            <label class="text-sm text-gray-600">Expiry</label>
            <input placeholder="MM/YY"
              class="w-full border p-3 rounded-lg mt-1">
          </div>
          <div class="w-1/2">
            <label class="text-sm text-gray-600">CVV</label>
            <input placeholder="123"
              class="w-full border p-3 rounded-lg mt-1">
          </div>
        </div>
      </div>

      <!-- UPI -->
      <div id="content-upi" class="tab-content hidden">

  <p class="text-sm text-gray-600 mb-4">Choose UPI App</p>

  <div class="grid grid-cols-2 gap-4 mb-6">

    <!-- PhonePe -->
    <div onclick="selectUpi('phonepe')"
         id="upi-phonepe"
         class="border rounded-xl p-4 cursor-pointer hover:shadow-md transition">

      <div class="flex items-center gap-3">
  <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png"
       class="h-8">
  <span class="font-semibold">Paytm</span>
</div>
    </div>

    <!-- Google Pay -->
    <div onclick="selectUpi('gpay')"
         id="upi-gpay"
         class="border rounded-xl p-4 cursor-pointer hover:shadow-md transition">

     <div class="flex items-center gap-3">
  <img src="https://cdn-icons-png.flaticon.com/512/6124/6124998.png"
     class="h-8">
  <span class="font-semibold">Google Pay</span>
</div>
    </div>

  </div>

  <p class="text-sm text-gray-500 mb-2">Or Enter UPI ID</p>

  <input id="upiId"
         placeholder="example@upi"
         class="w-full border p-3 rounded-lg">

</div>

      <!-- NET BANKING -->
      <div id="content-net" class="tab-content hidden">
        <label class="text-sm text-gray-600">Select Bank</label>
        <select class="w-full border p-3 rounded-lg mt-1">
          <option>SBI</option>
          <option>HDFC</option>
          <option>ICICI</option>
          <option>Axis Bank</option>
        </select>
      </div>

      <button id="payBtn"
        class="w-full bg-black hover:bg-gray-800 text-white py-3 rounded-lg mt-10 text-lg font-semibold">
        Pay Now
      </button>

      <div class="mt-6 text-sm text-gray-500">
        100% Secure Payments • PCI DSS Compliant • Encrypted Gateway
      </div>

    </div>

    <!-- RIGHT SUMMARY -->
    <div class="w-1/3 bg-gray-50 p-8 border-l">
      <h3 class="font-semibold text-lg mb-6">Order Summary</h3>
      <div class="bg-white rounded-xl shadow p-6">
        <p class="text-gray-500 text-sm mb-2">RideON Car Rental</p>
        <div class="flex justify-between text-lg font-bold border-t pt-4">
          <span>Total Amount</span>
          <span>₹ <span id="amount">0</span></span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div id="processingModal"
     class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
  <div class="bg-white p-10 rounded-2xl text-center w-80">
    <div id="loaderSection">
      <div class="loader mb-4"></div>
      <p class="font-semibold">Processing Payment...</p>
    </div>
    <div id="successSection" class="hidden">
      <div class="checkmark">✔</div>
      <p class="font-bold text-green-600 mt-3">Payment Successful</p>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://ecuvhnvpajodymdibuwt.supabase.co",
   "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXZobnZwYWpvZHltZGlidXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjA0ODcsImV4cCI6MjA4NTQ5NjQ4N30.qJclkXxnYjPu7vSZD4MGyJch6n4pCjcd9HiD8hdM31g"

);

const bookingId = localStorage.getItem("bookingId");

/* TAB SWITCH */
["card","upi","net"].forEach(tab => {
  document.getElementById("tab-"+tab).addEventListener("click", () => {

    ["card","upi","net"].forEach(t => {
      document.getElementById("tab-"+t).classList.remove("tab-active");
      document.getElementById("content-"+t).classList.add("hidden");
    });

    document.getElementById("tab-"+tab).classList.add("tab-active");
    document.getElementById("content-"+tab).classList.remove("hidden");
  });
});
let selectedUpi = null;

function selectUpi(app) {

  selectedUpi = app;

  document.getElementById("upi-phonepe").classList.remove("border-black","ring-2");
  document.getElementById("upi-gpay").classList.remove("border-black","ring-2");

  const selected = document.getElementById("upi-" + app);
  selected.classList.add("border-black","ring-2");
}

/* LOAD AMOUNT */
async function loadBookingAmount() {

  if (!bookingId) {
    console.log("No bookingId found");
    return;
  }

  const { data, error } = await supabaseClient
    .from("booking")
    .select("total_amount")
    .eq("id", Number(bookingId));

  console.log("Booking data:", data);
  console.log("Error:", error);

  if (error || !data || data.length === 0) return;

  const amount = data[0].total_amount;

  document.getElementById("amount").textContent = amount;
  document.getElementById("payBtn").textContent = "Pay ₹" + amount;
}

loadBookingAmount();

/* PAYMENT PROCESS */
document.getElementById("payBtn").addEventListener("click", async () => {

  if (!bookingId) return;

  document.getElementById("processingModal").classList.remove("hidden");

  setTimeout(async () => {

    await supabaseClient
      .from("booking")
      .update({ status: "paid" })
      .eq("id", Number(bookingId));

    document.getElementById("loaderSection").classList.add("hidden");
    document.getElementById("successSection").classList.remove("hidden");

    setTimeout(() => {
      window.location.href = "confirmation.html";
    }, 1500);

  }, 2000);
});
</script>

</body>
</html>
