<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Electric Cars | RideON</title>

  <!-- Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <style>
    :root {
      --bg: #F7F7E8;       /* SAME as home.html */
      --card: #ffffff;
      --muted: #6b7280;
      --accent: #114b72;
      --plate-gold: #d4af37;
    }

    body {
      font-family: Inter, ui-sans-serif;
      background: var(--bg);
      margin: 0;
    }

    /* Left filter panel */
    .filter-panel {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      width: 260px;
    }

    .filter-section+ .filter-section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>


  <!-- HEADER -->
  <header class="py-4 px-6 bg-transparent">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-center justify-between mb-4">

        <h1 style="font-family:'Cinzel';font-size:38px;">
  <a href="home.html" class="hover:opacity-80">
    <span class="text-green-900">Ride</span><span class="text-gray-600">ON</span>
  </a>
</h1>

        <div class="hidden md:flex">
          <button class="px-4 py-2 rounded-full bg-green-900 text-white">Login / Signup</button>
        </div>
      </div>

      <!-- SEARCH BAR -->
      <input id="searchInput" type="text" placeholder="Search for a car..."
        class="w-full rounded-lg p-4 border shadow-sm bg-white focus:ring-2 focus:ring-green-900 outline-none">
    </div>
  </header>
  


  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex layout-grid gap-8">

      <!-- LEFT FILTERS -->
      <aside class="filter-panel">
        <h2 class="text-xl font-semibold">Filters</h2>
        <p class="text-sm text-gray-500 mb-3">Fine-tune your search</p>

        <!-- PRICE -->
        <div class="filter-section">
          <h3 class="font-medium mb-2">Max Price</h3>
          <span id="priceLabel" class="text-green-700 font-semibold">₹1500</span>
          <input id="priceRange" type="range" min="0" max="1500" value="1500" class="w-full mt-3">
        </div>

        <!-- BRAND -->
        <div class="filter-section">
          <h3 class="font-medium mb-3">Brand</h3>

          <label class="flex items-center gap-3 mb-2"><input type="checkbox" class="brandFilter" value="maruti">Maruti</label>
          <label class="flex items-center gap-3 mb-2"><input type="checkbox" class="brandFilter" value="tata">Tata</label>
          <label class="flex items-center gap-3 mb-2"><input type="checkbox" class="brandFilter" value="mahindra">Mahindra</label>
          <label class="flex items-center gap-3"><input type="checkbox" class="brandFilter" value="toyota">Toyota</label>
        </div>
      </aside>

      <!-- CAR GRID -->
      <section class="flex-1">
       <div id="electricCars" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

          <!-- ======= ORIGINAL CAR CARDS (NOT CHANGED) ======= -->
        </div>
      </section>
    </div>
  </main>

<script>
/* FILTER LOGIC */
const searchInput = document.getElementById("searchInput");
const priceRange = document.getElementById("priceRange");
const priceLabel = document.getElementById("priceLabel");
const brandFilters = document.querySelectorAll(".brandFilter");
const carCards = document.querySelectorAll(".car-card");

priceLabel.textContent = "₹" + priceRange.value;

searchInput.addEventListener("input", applyFilters);
priceRange.addEventListener("input", () => {
  priceLabel.textContent = "₹" + priceRange.value;
  applyFilters();
});
brandFilters.forEach(cb => cb.addEventListener("change", applyFilters));

function applyFilters() {
  const q = searchInput.value.toLowerCase();
  const max = parseInt(priceRange.value);
  const brands = [...brandFilters].filter(c => c.checked).map(c => c.value);

  carCards.forEach(card => {
    const name = card.dataset.name.toLowerCase();
    const brand = card.dataset.brand;
    const price = parseInt(card.dataset.price);

    const ok = name.includes(q) && price <= max && (brands.length === 0 || brands.includes(brand));

    card.style.display = ok ? "flex" : "none";

    if (!ok) card.querySelector(".car-details").classList.remove("open");
  });
}

/* COLLAPSE DETAILS */
function cardClicked(e, card) {
  if (e.target.closest(".book-btn")) return;
  const d = card.querySelector(".car-details");
  const open = d.classList.contains("open");

  document.querySelectorAll(".car-details.open").forEach(x => {
    if (x !== d) x.classList.remove("open");
  });

  if (open) d.classList.remove("open");
  else d.classList.add("open");
}

/* ⭐ FIXED BOOK NOW — passes correct image */
function bookNow(e, btn) {
  e.stopPropagation();

  const card = btn.closest(".car-card");
  let imgSrc = card.querySelector(".car-img").getAttribute("src");

  // FIX WINDOWS PATHS → ALWAYS eco/filename.jpg
  if (imgSrc.includes("\\") || /^[A-Za-z]:/.test(imgSrc) || imgSrc.startsWith("file:///")) {
    imgSrc = imgSrc.split("\\").pop().split("/").pop();
    imgSrc = "eco/" + imgSrc;
  }

  const carData = {
    name: card.dataset.name,
    price: card.dataset.price,
    img: imgSrc,
    brand: card.dataset.brand,
    numberPlate: card.dataset.plate
  };

  localStorage.setItem("selectedCar", JSON.stringify(carData));
  window.location.href = "booking.html";
}

applyFilters();
</script>

<script type="module" src="script.js"></script>
<div
  id="carModal"
  class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50"
>
  <div
    class="bg-white rounded-2xl shadow-2xl w-full max-w-md relative overflow-hidden"
  >
    <!-- Close -->
    <button
      id="closeModal"
      class="absolute top-4 right-4 text-gray-500 hover:text-black text-xl z-10"
    >
      ✕
    </button>

    <!-- Image -->
    <div class="h-56 bg-gray-100 flex items-center justify-center">
      <img
        id="modalImage"
        class="max-h-full object-contain"
      />
    </div>

    <!-- Content -->
    <div class="p-6 text-center space-y-2">
      <h2 id="modalName" class="text-2xl font-bold"></h2>
      <p id="modalBrand" class="text-gray-500"></p>

      <p id="modalPrice" class="text-green-700 text-xl font-semibold"></p>

      <div class="text-sm text-gray-700 space-y-1 mt-3">
        <p><strong>Fuel:</strong> <span id="modalFuel"></span></p>
        <p><strong>Transmission:</strong> <span id="modalTransmission"></span></p>
        <p>
          <strong>Status:</strong>
          <span id="modalAvailability"></span>
        </p>
      </div>

      <!-- Button -->
      <button
        id="modalBookBtn"
        class="w-full mt-5 bg-black text-white py-3 rounded-xl hover:bg-gray-900 transition"
      >
        Book Now
      </button>
    </div>
  </div>
</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ecuvhnvpajodymdibuwt.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXZobnZwYWpvZHltZGlidXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjA0ODcsImV4cCI6MjA4NTQ5NjQ4N30.qJclkXxnYjPu7vSZD4MGyJch6n4pCjcd9HiD8hdM31g"

);

const carGrid = document.getElementById("carGrid");

async function loadElectricCars() {
  const { data: cars, error } = await supabase
    .from("cars")
    .select("*")
    .eq("category", "electric")
    .eq("availability", true);

  if (error) {
    console.error(error);
    return;
  }

  carGrid.innerHTML = "";

  cars.forEach(car => {
    const card = document.createElement("div");
    card.className = "car-card";
    card.dataset.name = car.name;
    card.dataset.brand = car.brand;
    card.dataset.price = car.rent_per_hour;

    card.innerHTML = `
      <img src="${car.image_url}" class="car-img" onclick='openCarModal(${JSON.stringify(car)})' />

      <h3 class="text-xl font-bold">${car.name}</h3>
      <p class="text-gray-500">${car.brand}</p>
      <p class="text-green-700 font-semibold">₹${car.rent_per_hour} / hour</p>

      <div class="car-details">
        <p><strong>Fuel:</strong> ${car.fuel}</p>
        <p><strong>Transmission:</strong> ${car.transmission}</p>
        <p><strong>Status:</strong> ${car.availability ? "Available" : "Booked"}</p>

        <button class="book-btn mt-3"
          onclick="selectCar('${car.id}')">
          Book Now
        </button>
      </div>
    `;

    card.onclick = (e) => cardClicked(e, card);
    carGrid.appendChild(card);
  });
}

window.selectCar = function (carId) {
  localStorage.setItem("selectedCarId", carId);
  window.location.href = "booking.html";
};

loadElectricCars();
</script>


</body>
</html>
