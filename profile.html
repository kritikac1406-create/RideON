<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account - RideON</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f1e8;
  --primary:#2e7d32;
}

body{
  font-family:'Lato',sans-serif;
  background:var(--bg);
}

h1,h2,h3{font-family:'Cinzel',serif}

.sidebar{
  background:white;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card{
  background:white;
  border-radius:18px;
  padding:30px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.menu-item{
  padding:10px 0;
  cursor:pointer;
  transition:0.3s;
}

.menu-item:hover{
  color:var(--primary);
}

.active-tab{
  color:var(--primary);
  font-weight:600;
}

.btn{
  background:var(--primary);
  color:white;
  padding:8px 20px;
  border-radius:9999px;
}

.track-btn{
  background:#2e7d32;
  color:white;
  padding:6px 14px;
  border-radius:8px;
}
</style>
</head>

<body class="min-h-screen p-10">

<div class="max-w-7xl mx-auto grid md:grid-cols-4 gap-8">

  <!-- SIDEBAR -->
  <div class="sidebar p-8 md:col-span-1 text-center">

    <div class="w-24 h-24 mx-auto rounded-full bg-gray-200 flex items-center justify-center text-4xl mb-4">
      👤
    </div>

    <h2 class="text-xl font-semibold" id="sidebarName">User</h2>
    <p class="text-sm text-gray-600 mt-1" id="sidebarEmail"></p>

    <div class="mt-8 border-t pt-6 text-left space-y-3">
      <div class="menu-item active-tab" onclick="showSection('account')">Account</div>
      <div class="menu-item" onclick="showSection('booking')">My Bookings</div>
      <div class="menu-item" onclick="showSection('transactions')">Transactions</div>
    </div>

  </div>

  <!-- MAIN -->
  <div class="md:col-span-3 space-y-8">

    <!-- ACCOUNT -->
    <div id="accountSection" class="card">
      <h2 class="text-3xl mb-6 text-green-900">Account Details</h2>

      <div class="grid md:grid-cols-2 gap-6">
        <input id="userName" class="border p-3 rounded bg-gray-100" disabled>
        <input type="date" id="userDOB" class="border p-3 rounded">
        <input id="userEmail" class="border p-3 rounded bg-gray-100 md:col-span-2" disabled>
      </div>

      <button onclick="saveProfile()" class="btn mt-6">Save Changes</button>
    </div>

    <!-- BOOKINGS -->
    <div id="bookingSection" class="card hidden">
      <h2 class="text-3xl mb-6 text-green-900">My Bookings</h2>
      <div id="bookingContainer">Loading...</div>
    </div>

    <!-- TRANSACTIONS -->
    <div id="transactionSection" class="card hidden">
      <h2 class="text-3xl mb-6 text-green-900">Transactions</h2>
      <div id="transactionContainer">Loading...</div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ecuvhnvpajodymdibuwt.supabase.co",
     "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXZobnZwYWpvZHltZGlidXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjA0ODcsImV4cCI6MjA4NTQ5NjQ4N30.qJclkXxnYjPu7vSZD4MGyJch6n4pCjcd9HiD8hdM31g"

);

let currentUser = null;

// LOAD USER
document.addEventListener("DOMContentLoaded", async () => {

  const { data } = await supabaseClient.auth.getUser();

  if (!data.user) {
    window.location.href = "log.html";
    return;
  }

  currentUser = data.user;

  document.getElementById("sidebarName").textContent =
    currentUser.user_metadata?.name || currentUser.email;

  document.getElementById("sidebarEmail").textContent =
    currentUser.email;

  document.getElementById("userName").value =
    currentUser.user_metadata?.name || "";

  document.getElementById("userEmail").value =
    currentUser.email;

  const { data: userData } = await supabaseClient
    .from("users")
    .select("dob")
    .eq("id", currentUser.id)
    .single();

  if (userData?.dob) {
    document.getElementById("userDOB").value = userData.dob;
  }
});

// SWITCH SECTIONS
function showSection(section){

  document.getElementById("accountSection").classList.add("hidden");
  document.getElementById("bookingSection").classList.add("hidden");
  document.getElementById("transactionSection").classList.add("hidden");

  document.querySelectorAll(".menu-item").forEach(item=>{
    item.classList.remove("active-tab");
  });

  if(section === "account"){
    accountSection.classList.remove("hidden");
    document.querySelectorAll(".menu-item")[0].classList.add("active-tab");
  }

  if(section === "booking"){
    bookingSection.classList.remove("hidden");
    document.querySelectorAll(".menu-item")[1].classList.add("active-tab");
    loadBooking();
  }

  if(section === "transactions"){
    transactionSection.classList.remove("hidden");
    document.querySelectorAll(".menu-item")[2].classList.add("active-tab");
    loadTransactions();
  }
}

// SAVE PROFILE
async function saveProfile(){

  const dob = document.getElementById("userDOB").value;

  if(!dob){
    alert("Select birthdate");
    return;
  }

  await supabaseClient
    .from("users")
    .update({ dob: dob })
    .eq("id", currentUser.id);

  alert("Saved!");
}

// LOAD BOOKINGS
async function loadBooking(){

  const container = document.getElementById("bookingContainer");

  const { data: bookings } = await supabaseClient
    .from("booking")
    .select("*")
    .eq("user_id", currentUser.id)
    .eq("status", "paid")
    .order("created_at", { ascending: false });

  if (!bookings || bookings.length === 0) {
    container.innerHTML = "No bookings found";
    return;
  }

  container.innerHTML = "";

  bookings.forEach(booking => {

    container.innerHTML += `
      <div class="border p-5 rounded-xl mb-4 flex justify-between items-center">

        <div>
          <p class="text-sm text-gray-500">Car</p>
          <p class="font-semibold">${booking.car_name}</p>
        </div>

        <div>
          <p class="text-sm text-gray-500">Pickup</p>
          <p>${booking.pickup_date}</p>
        </div>

        <div>
          <p class="text-sm text-gray-500">Amount</p>
          <p>₹ ₹ ${booking.total_amount}</p>
        </div>

        <button onclick="trackRide(${booking.id})"
          class="track-btn">
          Track
        </button>

      </div>
    `;
  });
}

// TRACK BUTTON
function trackRide(id){
  localStorage.setItem("bookingId", id);
  window.location.href = "track.html";
}

// LOAD TRANSACTIONS
async function loadTransactions(){

  const container = document.getElementById("transactionContainer");

  const { data: bookings } = await supabaseClient
    .from("booking")
    .select("*")
    .eq("user_id", currentUser.id)
    .eq("status", "paid");

  if (!bookings || bookings.length === 0) {
    container.innerHTML = "No transactions";
    return;
  }

  container.innerHTML = "";

  bookings.forEach(b => {
    container.innerHTML += `
      <div class="border p-5 rounded-xl mb-4">
        <div class="flex justify-between">
          <p>${b.car_name}</p>
          <p>₹ ${b.total_amount}</p>
        </div>
        <p class="text-sm text-gray-500 mt-2">
          ${b.pickup_date} • ${b.status}
        </p>
      </div>
    `;
  });
}
</script>

</body>
</html>
