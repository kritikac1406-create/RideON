<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manage Offers | RideON Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family:'Lato',sans-serif; background:#f7f8e8; margin:0; }
    h1,h2,h3 { font-family:'Cinzel',serif; }
  </style>
</head>
<body class="min-h-screen">
  
 <nav class="fixed top-0 left-0 w-full z-50 bg-white shadow-md border-b">
  <div class="w-full grid grid-cols-3 items-center px-4 py-4">
    <div class="flex justify-start items-center">
      <div class="text-2xl font-bold" style="font-family:'Cinzel'">
        Ride<span class="text-gray-600">ON</span> <span class="text-xs text-red-600 ml-2 font-sans tracking-widest px-2 py-1 bg-red-100 rounded-md">ADMIN PANEL</span>
      </div>
    </div>
    <div class="flex justify-center">
      <ul class="hidden md:flex items-center space-x-8 text-lg font-bold">
        <li><a href="offer.html" class="text-[#114b72] border-b-2 border-[#114b72] pb-1">Offers</a></li>
        <li><a href="admin-dashboard.html" class="hover:text-[#114b72] transition">Dashboard</a></li>
        <li><a href="addcar.html" class="hover:text-[#114b72] transition">Add Cars</a></li>
        <li><a href="admin-users.html" class="hover:text-[#114b72] transition">Users</a></li>
      </ul>
    </div>
    <div class="flex justify-end items-center gap-4">
      <button onclick="adminLogout()" class="text-red-600 font-bold hover:underline bg-red-50 px-4 py-2 rounded-lg">
        Logout <i class="fas fa-sign-out-alt ml-1"></i>
      </button>
    </div>
  </div>
 </nav>

 <main class="pt-28 max-w-6xl mx-auto px-4" id="adminContent" style="display:none;">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold">Manage Special Offers</h1>
    </div>

    <!-- ADD OFFER FORM -->
    <div class="bg-white p-6 rounded-xl shadow border mb-10">
        <h2 class="text-2xl font-bold mb-4">Create New Offer</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="newTitle" type="text" placeholder="Offer Title (e.g. Economy Cars)" class="border p-3 rounded w-full">
            <input id="newDiscount" type="number" placeholder="Discount % (e.g. 5)" class="border p-3 rounded w-full">
            <select id="newCategory" class="border p-3 rounded w-full bg-white text-gray-700">
                <option value="" disabled selected>Select Category</option>
                <option value="economy">Economy</option>
                <option value="luxury">Luxury</option>
                <option value="electric">Electric</option>
            </select>
            <input id="newImageFile" type="file" accept="image/*" class="border p-2 rounded w-full bg-white text-gray-600">
        </div>
        <textarea id="newDesc" placeholder="Description" class="border p-3 rounded w-full mt-4" rows="2"></textarea>
        <button onclick="addOffer()" class="mt-4 text-white px-6 py-3 rounded-lg font-bold transition w-full md:w-auto" style="background-color: #114b72;">
            Submit
        </button>
    </div>

    <!-- OFFERS GRID -->
    <h2 class="text-2xl font-bold mb-4">Active Offers Live on Site</h2>
    <div id="offersGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-20">
        <div class="col-span-3 text-center text-gray-500 py-10">Loading offers...</div>
    </div>
 </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = supabase.createClient("https://ecuvhnvpajodymdibuwt.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXZobnZwYWpvZHltZGlidXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjA0ODcsImV4cCI6MjA4NTQ5NjQ4N30.qJclkXxnYjPu7vSZD4MGyJch6n4pCjcd9HiD8hdM31g");

async function checkAdmin() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) { window.location.replace("log.html"); return; }
  const role = user.user_metadata?.role || "user";
  if (role !== "admin") {
    alert("Unauthorized access. Admin only.");
    window.location.replace("home.html");
    return;
  }
  document.getElementById("adminContent").style.display = "block";
  loadOffers();
}

async function adminLogout() {
  await supabaseClient.auth.signOut();
localStorage.removeItem('userRole');
  window.location.replace("log.html");
}

async function loadOffers() {
    const grid = document.getElementById("offersGrid");
    const { data, error } = await supabaseClient.from("offers").select("*").order("created_at", { ascending: false });
    
    if (error) {
        console.error(error);
        grid.innerHTML = `<div class="col-span-3 text-red-500">Failed to load offers. Did you turn off RLS or add the policies?</div>`;
        return;
    }

    if (!data || data.length === 0) {
        grid.innerHTML = `<div class="col-span-3 text-gray-500">No active offers. Create one above!</div>`;
        return;
    }

    grid.innerHTML = "";
    data.forEach(offer => {
        grid.innerHTML += `
        <div class="bg-white rounded-xl overflow-hidden shadow-lg border flex flex-col">
            <div class="relative h-48">
                <img src="${offer.image_url}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                <div class="absolute inset-0 bg-black bg-opacity-40"></div>
                <div class="absolute top-4 left-4 border-2 border-white px-3 py-1 text-white rounded">
                    <p class="text-xs">UP TO</p>
                    <p class="text-xl font-bold">${offer.discount || 0}%</p>
                </div>
            </div>
            <div class="p-5 flex-grow">
                <h3 class="text-xl font-bold mb-2">${offer.title}</h3>
                <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded inline-block mb-2">Cat: ${offer.category || 'N/A'}</span>
                <p class="text-gray-600 text-sm">${offer.description || ''}</p>
            </div>
            <div class="p-4 bg-gray-50 border-t">
                <button onclick="deleteOffer('${offer.id}')" class="text-red-600 font-bold hover:underline w-full text-center">Delete Offer</button>
            </div>
        </div>
        `;
    });
}

async function addOffer() {
    const title = document.getElementById("newTitle").value.trim();
    const discount = document.getElementById("newDiscount").value;
    const category = document.getElementById("newCategory").value;
    const desc = document.getElementById("newDesc").value.trim();
    
    const fileInput = document.getElementById("newImageFile");
    const file = fileInput.files[0];

    if (!title || !category || !file) {
        alert("Title, Category, and an Image file are completely required.");
        return;
    }

    // 1. Upload Image to Supabase Storage
    const fileExt = file.name.split('.').pop();
    const fileName = Math.random().toString(36).substring(2) + Date.now() + "." + fileExt;

    const { data: uploadData, error: uploadError } = await supabaseClient.storage
        .from("offer-images")
        .upload(fileName, file);

    if (uploadError) {
        alert("Error uploading image: " + uploadError.message);
        console.error(uploadError);
        return;
    }

    // 2. Get Public URL
    const { data: publicUrlData } = supabaseClient.storage
        .from("offer-images")
        .getPublicUrl(fileName);
        
    const imageUrl = publicUrlData.publicUrl;

    // 3. Insert into Database
    const { error } = await supabaseClient.from("offers").insert([{
        title: title,
        discount: discount ? parseInt(discount) : 0,
        category: category,
        image_url: imageUrl,
        description: desc || null
    }]);

    if (error) {
        alert("Error saving offer to database: " + error.message);
        console.error(error);
    } else {
        document.getElementById("newTitle").value = '';
        document.getElementById("newDiscount").value = '';
        document.getElementById("newCategory").value = '';
        document.getElementById("newImageFile").value = '';
        document.getElementById("newDesc").value = '';
        loadOffers();
    }
}

async function deleteOffer(id) {
    if (!confirm("Are you sure you want to delete this offer from the live site?")) return;
    
    const { error } = await supabaseClient.from("offers").delete().eq("id", id);
    if (error) {
        alert("Error deleting offer: " + error.message);
    } else {
        loadOffers();
    }
}

checkAdmin();
</script>
</body>
</html>
