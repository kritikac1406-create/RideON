<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Booking | RideON</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(145deg, #e6ebb7, #f3f5da);
      font-family: Inter, sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.9);
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      backdrop-filter: blur(6px);
      padding: 24px;
    }
    .primary-btn {
      background:#114b72;
      color:white;
      font-weight:600;
      padding:12px;
      border-radius:12px;
    }
  </style>
</head>

<body>

<header class="py-4 px-6">
  <div class="max-w-7xl mx-auto bg-white/30 backdrop-blur-md border border-white/40 rounded-2xl px-6 py-3 flex justify-between items-center">
    <h1 class="text-3xl font-bold" style="font-family:Cinzel">
      <span style="color:#32410a;">RIDE</span><span style="color:#3c4550;">ON</span>
    </h1>
    <button class="px-5 py-2 rounded-xl bg-green-700 text-white">Login</button>
  </div>
</header>

<!-- IMAGE -->
<div class="max-w-4xl mx-auto mt-6">
  <img id="carImg" class="w-full max-h-[350px] object-contain rounded-xl shadow-lg">
</div>

<!-- CAR DETAILS -->
<div class="max-w-4xl mx-auto card mt-6">
  <h2 id="carName" class="text-3xl font-bold"></h2>
  <p id="carPrice" class="text-xl font-semibold text-green-700 mt-1"></p>

  <div class="grid grid-cols-2 gap-4 mt-4 text-gray-700">
    <p><b>Fuel:</b> <span id="carFuel"></span></p>
    <p><b>Transmission:</b> <span id="carTransmission"></span></p>
    <p><b>Seats:</b> <span id="carSeats"></span></p>
    <p><b>Model Year:</b> <span id="carYear"></span></p>
  </div>
</div>

<!-- BOOKING FORM (original fields + validation) -->
<div class="max-w-4xl mx-auto card mt-8 mb-10">
  <h2 class="text-3xl font-bold mb-6">Book This Car</h2>

  <form id="bookingForm" class="space-y-6" novalidate>

    <div>
      <label class="block text-sm font-semibold mb-2">Full Name *</label>
      <input type="text" id="fullName" name="fullName" required class="w-full border px-4 py-3 rounded-lg shadow-sm">
    </div>

    <div>
      <label class="block text-sm font-semibold mb-2">Email *</label>
      <input type="email" id="email" name="email" required class="w-full border px-4 py-3 rounded-lg shadow-sm">
    </div>

    <div>
      <label class="block text-sm font-semibold mb-2">Phone Number *</label>
      <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required class="w-full border px-4 py-3 rounded-lg shadow-sm">
      <small class="text-gray-500">Enter 10-digit number</small>
    </div>

    <!-- DRIVING LICENSE FIELD (original) -->
    <div>
      <label class="block text-sm font-semibold mb-2">Driving License Number *</label>
      <input type="text" id="license" name="license" maxlength="15"
             placeholder="e.g. MH1420150012345"
             required class="w-full border px-4 py-3 rounded-lg shadow-sm uppercase">
      <small class="text-gray-500">Format: SS00YYYY0000000 (15 characters)</small>
    </div>

    <div>
      <label class="block text-sm font-semibold mb-2">Pickup Address *</label>
      <input type="text" id="pickupAddress" name="pickupAddress" required class="w-full border px-4 py-3 rounded-lg shadow-sm">
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold mb-2">Pickup Date *</label>
        <input type="date" id="pickupDate" name="pickupDate" required class="w-full border px-4 py-3 rounded-lg shadow-sm">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">Pickup Time *</label>
        <select id="pickupTime" name="pickupTime" required class="w-full border px-4 py-3 rounded-lg shadow-sm">
          <option value="">--Select--</option>
          <option>08:00am</option>
          <option>10:00am</option>
          <option>12:00pm</option>
          <option>14:00pm</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold mb-2">Drop Off Address *</label>
      <input type="text" id="dropAddress" name="dropAddress" required class="w-full border px-4 py-3 rounded-lg shadow-sm">
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold mb-2">Drop Date *</label>
        <input type="date" id="dropDate" name="dropDate" required class="w-full border px-4 py-3 rounded-lg shadow-sm">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">Drop Time *</label>
        <select id="dropTime" name="dropTime" required class="w-full border px-4 py-3 rounded-lg shadow-sm">
          <option value="">--Select--</option>
          <option>08:00am</option>
          <option>10:00am</option>
          <option>12:00pm</option>
          <option>14:00pm</option>
        </select>
      </div>
    </div>

    <!-- TOTAL AMOUNT -->
    <div class="mt-4">
      <p class="text-xl font-bold">Total Amount: 
        <span id="totalAmount" class="text-green-700">₹0</span>
      </p>
    </div>

    <button type="submit" class="primary-btn w-full mt-4">
      Confirm Booking
    </button>

  </form>
</div>

<script>
  // load selected car (same as original behavior)
  const carData = JSON.parse(localStorage.getItem("selectedCar"));
  let hourlyPrice = 0;

  if(carData){
    document.getElementById("carImg").src = carData.img;
    document.getElementById("carName").textContent = carData.name;
    document.getElementById("carPrice").textContent = "₹" + carData.price + "/hr";
    document.getElementById("carFuel").textContent = carData.fuel;
    document.getElementById("carTransmission").textContent = carData.transmission;
    document.getElementById("carSeats").textContent = carData.seats;
    document.getElementById("carYear").textContent = carData.year;
    hourlyPrice = parseInt(carData.price);
  }

  // ----- Total calculation helper -----
  // Convert select time strings like "08:00am" to "HH:MM" 24-hour for Date constructor
  function parseSelectTime(t){
    if(!t) return '';
    const m = t.match(/^(\d{1,2}):(\d{2})(am|pm)$/i);
    if(!m) return t;
    let hh = parseInt(m[1],10);
    const mm = m[2];
    const ap = m[3].toLowerCase();
    if(ap === 'pm' && hh !== 12) hh += 12;
    if(ap === 'am' && hh === 12) hh = 0;
    return String(hh).padStart(2,'0') + ':' + mm;
  }

  function calculateTotal(){
    const pDate = document.getElementById("pickupDate").value;
    const pTimeSel = document.getElementById("pickupTime").value;
    const dDate = document.getElementById("dropDate").value;
    const dTimeSel = document.getElementById("dropTime").value;

    if(!pDate || !pTimeSel || !dDate || !dTimeSel) return;

    const pTime = parseSelectTime(pTimeSel);
    const dTime = parseSelectTime(dTimeSel);

    const start = new Date(`${pDate}T${pTime}:00`);
    const end   = new Date(`${dDate}T${dTime}:00`);

    if(isNaN(start) || isNaN(end) || end <= start){
      document.getElementById("totalAmount").innerText = "Invalid Dates";
      localStorage.removeItem("totalAmount");
      return;
    }

    const diffHours = (end - start) / (1000 * 60 * 60);
    const total = Math.ceil(diffHours) * (hourlyPrice || 0);
    document.getElementById("totalAmount").innerText = "₹" + total;
    localStorage.setItem("totalAmount", total);
  }

  const pDateEl = document.getElementById("pickupDate");
  const dDateEl = document.getElementById("dropDate");
  if (localStorage.getItem("pickupDate")) pDateEl.value = localStorage.getItem("pickupDate");
  if (localStorage.getItem("dropDate")) dDateEl.value = localStorage.getItem("dropDate");

  document.querySelectorAll("#pickupDate,#pickupTime,#dropDate,#dropTime")
          .forEach(i => i.addEventListener("change", calculateTotal));

  calculateTotal();

  // ------------------------
  //  ORIGINAL VALIDATION (exact behavior)
  // ------------------------
  document.getElementById("bookingForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const license = document.getElementById("license").value.toUpperCase().trim();

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const phoneRegex = /^[0-9]{10}$/;

    // exact driving license regex from original upload (states + year window + 7 digits)
    const dlRegex =
      /^(AP|AR|AS|BR|CG|CH|DD|DL|DN|GA|GJ|HP|HR|JH|JK|KA|KL|LA|LD|MH|ML|MN|MP|MZ|NL|OD|PB|PY|RJ|SK|TN|TR|TS|UK|UP|WB)[0-9]{2}(19[8-9][0-9]|20[0-2][0-5])[0-9]{7}$/;

    let valid = true;

    if (!emailRegex.test(email)) {
      alert("Invalid Email Address");
      valid = false;
    }

    if (!phoneRegex.test(phone)) {
      alert("Invalid Phone Number. Enter 10 digits.");
      valid = false;
    }

    if (!dlRegex.test(license)) {
      alert("Invalid Driving License Number.\nExample: MH1420150012345");
      valid = false;
    }

    if (!localStorage.getItem("totalAmount")) {
      alert("Please select valid dates !");
      valid = false;
    }

    if (!valid) return;  // STOP if validation fails

    // if valid -> proceed to payment
    window.location.href = "payment.html";
  });
</script>

</body>
</html>
