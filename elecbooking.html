<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Electric Car Booking | RideON</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: #e6ebb7; font-family: Inter, sans-serif; }
    .card { background: rgba(255,255,255,0.95); border-radius: 12px; padding: 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
    .primary-btn { background: #114b72; color:#fff; padding:12px; border-radius:8px; font-weight:600; }
  </style>
</head>

<body>

<!-- CAR DISPLAY -->
<div class="max-w-4xl mx-auto card mt-8">
  <img id="carImg" class="w-full max-h-[350px] object-contain rounded-lg" alt="car image" />
  <h2 id="carName" class="text-3xl font-bold mt-4"></h2>
  <p id="carPrice" class="text-xl font-semibold text-green-700 mt-1"></p>
</div>

<!-- BOOKING FORM -->
<div class="max-w-4xl mx-auto card mt-6">
  <h2 class="text-2xl font-bold mb-4">Book This Electric Car</h2>

  <form id="bookingForm" class="space-y-5">
    <div>
      <label>Full Name *</label>
      <input id="fullName" type="text" name="fullName" required class="w-full border p-2 rounded">
    </div>

    <div>
      <label>Email *</label>
      <input id="email" type="email" name="email" required class="w-full border p-2 rounded">
    </div>

    <div>
      <label>Phone *</label>
      <input id="phone" type="tel" name="phone" pattern="[0-9]{10}" required class="w-full border p-2 rounded">
    </div>

    <div>
      <label>Driving License *</label>
      <input id="license" type="text" maxlength="15" required class="w-full border p-2 rounded uppercase">
      <small>Format: SS00YYYY0000000</small>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label>Pickup Date *</label>
        <input id="pickupDate" type="date" required class="w-full border p-2 rounded">
      </div>
      <div>
        <label>Pickup Time *</label>
        <select id="pickupTime" required class="w-full border p-2 rounded">
          <option value="">--Select--</option>
          <option>08:00am</option>
          <option>10:00am</option>
          <option>12:00pm</option>
          <option>14:00pm</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label>Drop Date *</label>
        <input id="dropDate" type="date" required class="w-full border p-2 rounded">
      </div>
      <div>
        <label>Drop Time *</label>
        <select id="dropTime" required class="w-full border p-2 rounded">
          <option value="">--Select--</option>
          <option>08:00am</option>
          <option>10:00am</option>
          <option>12:00pm</option>
          <option>14:00pm</option>
        </select>
      </div>
    </div>

    <!-- PRICE DISPLAY -->
    <p class="text-xl font-bold">Total Amount: <span id="totalAmount" class="text-green-700">₹0</span></p>

    <button type="submit" class="primary-btn w-full">Confirm Booking</button>
  </form>
</div>

<script>
(function(){
  const carImg = document.getElementById('carImg');
  const carName = document.getElementById('carName');
  const carPriceEl = document.getElementById('carPrice');
  const totalAmountEl = document.getElementById('totalAmount');

  const pickupDate = document.getElementById('pickupDate');
  const pickupTime = document.getElementById('pickupTime');
  const dropDate = document.getElementById('dropDate');
  const dropTime = document.getElementById('dropTime');
  
  if (localStorage.getItem("pickupDate")) pickupDate.value = localStorage.getItem("pickupDate");
  if (localStorage.getItem("dropDate")) dropDate.value = localStorage.getItem("dropDate");

  let carData = null;
  try { carData = JSON.parse(localStorage.getItem('selectedCar')); }
  catch(e){ console.warn('Cannot load selected EV car'); }

  let hourlyPrice = 0;

  if(!carData){
    carName.textContent = "No EV Selected";
    carPriceEl.textContent = "";
  } else {
    carImg.src = carData.img;
    carName.textContent = carData.name;

    const raw = String(carData.price || '').replace(/[^\d]/g,'');
    hourlyPrice = parseInt(raw || "0");

    carPriceEl.textContent = "₹" + hourlyPrice + "/hr";
  }

  function convertTimeString(t){
    if(!t) return '';
    const m = t.match(/^(\d{1,2}):(\d{2})(am|pm)$/i);
    if(!m) return '';
    let hh = parseInt(m[1]);
    const mm = m[2];
    const ap = m[3].toLowerCase();
    if(ap === 'pm' && hh !== 12) hh += 12;
    if(ap === 'am' && hh === 12) hh = 0;
    return String(hh).padStart(2,'0') + ":" + mm;
  }

  function calculateTotal(){
    const pd = pickupDate.value;
    const dd = dropDate.value;
    const pt = convertTimeString(pickupTime.value);
    const dt = convertTimeString(dropTime.value);

    if(!pd || !dd || !pt || !dt) return;

    const start = new Date(pd + "T" + pt + ":00");
    const end = new Date(dd + "T" + dt + ":00");

    if(end <= start){
      totalAmountEl.textContent = "Invalid Dates";
      return;
    }

    const hours = (end - start) / (1000 * 60 * 60);
    const total = Math.ceil(hours) * hourlyPrice;

    totalAmountEl.textContent = "₹" + total;
    localStorage.setItem("totalAmount", total);
  }

  [pickupDate, pickupTime, dropDate, dropTime].forEach(el=>{
    el.addEventListener("change", calculateTotal);
  });

  window.addEventListener("load", calculateTotal);

  document.getElementById("bookingForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const license = document.getElementById("license").value.trim().toUpperCase();

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const phoneRegex = /^[0-9]{10}$/;
    const dlRegex =
      /^(AP|AR|AS|BR|CG|CH|DD|DL|DN|GA|GJ|HP|HR|JH|JK|KA|KL|LA|LD|MH|ML|MN|MP|MZ|NL|OD|PB|PY|RJ|SK|TN|TR|TS|UK|UP|WB)[0-9]{2}(19[8-9][0-9]|20[0-2][0-5])[0-9]{7}$/;

    if(!emailRegex.test(email)){ alert("Invalid Email"); return; }
    if(!phoneRegex.test(phone)){ alert("Invalid Phone"); return; }
    if(!dlRegex.test(license)){ alert("Invalid License Format"); return; }

    const total = localStorage.getItem("totalAmount");
    if(!total || total <= 0){
      alert("Please pick correct date & time.");
      return;
    }

    window.location.href = "payment.html";
  });

})();
</script>

</body>
</html>
