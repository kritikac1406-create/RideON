<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | RideON</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #f4f6e8;
      font-family: sans-serif;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center">

  <!-- LOGIN CARD -->
  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
    <h2 class="text-2xl font-bold text-center mb-6">Admin Login</h2>

    <input
      id="email"
      type="email"
      placeholder="Admin Email"
      class="w-full border p-3 rounded mb-4"
    />

    <input
      id="pass"
      type="password"
      placeholder="Password"
      class="w-full border p-3 rounded mb-4"
    />

    <button
      onclick="adminLogin()"
      class="w-full bg-green-700 text-white py-3 rounded font-semibold"
    >
      Login
    </button>

    <p class="text-center text-gray-500 mt-4">
      RideON Admin Panel
    </p>
  </div>

  <!-- Supabase SDK -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- Admin Login Logic -->
  <script>
    if (sessionStorage.getItem("role") !== "admin") {
  window.location.href = "home.html";
}

    // 🔐 CREATE SUPABASE CLIENT
    const supabaseClient = supabase.createClient(
      "https://ecuvhnvpajodymdibuwt.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXZobnZwYWpvZHltZGlidXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjA0ODcsImV4cCI6MjA4NTQ5NjQ4N30.qJclkXxnYjPu7vSZD4MGyJch6n4pCjcd9HiD8hdM31g"

    );

    // 🔐 ADMIN LOGIN FUNCTION
    async function adminLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("pass").value.trim();

      if (!email || !password) {
        alert("Please enter email and password");
        return;
      }

      // 1️⃣ AUTHENTICATE ADMIN
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert(error.message);
        return;
      }

      // 2️⃣ CHECK ADMIN TABLE
      const { data: admin, error: adminError } = await supabaseClient
        .from("admins")
        .select("*")
        .eq("id", data.user.id)
        .single();

      if (!admin || adminError) {
        alert("Access denied. You are not an admin.");
        await supabaseClient.auth.signOut();
        return;
      }

      // 3️⃣ SUCCESS
      alert("Admin login successful ✅");
      window.location.href = "admin-home.html";
    }
  </script>

</body>
</html>
